<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vertex Trading</title>
  <meta name="description" content="Advanced Trading Platform for Cryptocurrency and Digital Assets" />
  <meta name="author" content="Vertex Trading" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta property="og:image" content="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/svg/color/btc.svg" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vertex Trading" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="msapplication-TileColor" content="#1f2937" />
  <meta name="theme-color" content="#1f2937" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="152x152" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="167x167" href="/favicon.svg" />
</head>

<body>
  <div id="root"></div>
  <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js?' + Date.now())
          .then((registration) => {
            console.log('SW registered: ', registration);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New content is available, refresh the page
                  window.location.reload();
                }
              });
            });
          })
          .catch((registrationError) => {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }

    // Enhanced cache clearing function
    window.clearVertexCache = async () => {
      try {
        console.log('Clearing all caches and storage...');
        
        // Clear all caches
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => caches.delete(name)));
        }

        // Clear storage
        localStorage.clear();
        sessionStorage.clear();

        // Unregister service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(reg => reg.unregister()));
        }

        // Force hard reload with cache bust
        window.location.href = window.location.href + '?cache_bust=' + Date.now();
      } catch (error) {
        console.error('Error clearing cache:', error);
        window.location.reload();
      }
    };

    // Auto-clear cache on version mismatch
    window.addEventListener('DOMContentLoaded', () => {
      const APP_VERSION = '1.0.5'; // Keep in sync with cache-utils.ts
      const storedVersion = localStorage.getItem('vertex_app_version');
      
      if (storedVersion && storedVersion !== APP_VERSION) {
        console.log('Version mismatch detected, clearing cache...');
        window.clearVertexCache();
      }
    });
  </script>
</body>

</html>
